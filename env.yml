name: pocket_graphbp
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip
  - wheel

  - pytorch==1.12.1
  - torchvision==0.13.1
  - torchaudio==0.12.1
  - cudatoolkit=11.3
  - pyg
  - pytorch-scatter
  - pytorch-sparse
  - pytorch-cluster
  - pytorch-spline-conv
  - rdkit
  - biopython

  - numpy<1.24
  - scipy
  - pandas
  - tqdm
  - mdtraj
  - pyyaml
  - biotite

  - pip:
    - tensorflow==2.9.0
    - protobuf==3.19.6
    - networkx
    - scikit-learn
    - joblib