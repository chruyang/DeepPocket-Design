<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Drug Design Platform</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f7fa; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .upload-area { border: 2px dashed #3498db; padding: 40px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 20px 0; }
        .upload-area:hover { background: #eaf6ff; }
        #status { margin-top: 20px; display: none; }
        .step { margin: 10px 0; padding: 10px; border-left: 4px solid #ddd; background: #fafafa; }
        .step.active { border-color: #3498db; background: #fff; }
        .step.done { border-color: #2ecc71; color: #2ecc71; }
        button { background: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; }
        button:disabled { background: #bdc3c7; }
        pre { background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 6px; overflow-x: auto; }

        /* 增加一个跳动的点动画，表示正在后台计算 */
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);}
            40% { color: black; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);}
            60% { text-shadow: .25em 0 0 black, .5em 0 0 rgba(0,0,0,0);}
            80%, 100% { text-shadow: .25em 0 0 black, .5em 0 0 black;}
        }
    </style>
</head>
<body>

<div class="card">
    <h1>💊 AI Drug Design Pipeline</h1>
    <p style="text-align: center; color: #7f8c8d;">PocketMiner (Target) → MD (Open) → GraphBP (Generate)</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <h3>Click to Upload PDB File</h3>
        <p>Supports .pdb (Protein structures)</p>
        <input type="file" id="fileInput" style="display:none" onchange="handleFile(this.files)">
    </div>
    <div id="fileName" style="text-align: center; margin-bottom: 10px; font-weight: bold;"></div>

    <button id="runBtn" onclick="runPipeline()" disabled>Run AI Pipeline</button>

    <div id="status">
        <h3>Pipeline Status:</h3>
        <div id="logArea"></div>
        <div id="resultArea" style="display:none; margin-top: 20px;">
            <h3>✅ Generation Complete!</h3>
            <p>Target Residue: <b id="resIdx"></b></p>
            <p>Center Coordinate: <b id="centerCoord"></b></p>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <a id="downloadLink" href="#" target="_blank" style="flex: 1;"><button style="background: #2ecc71;">Download Molecules (.pkl)</button></a>
                <a id="downloadPdbLink" href="#" target="_blank" style="flex: 1;"><button style="background: #9b59b6;">Download MD Pocket (.pdb)</button></a>
            </div>
        </div>
    </div>
</div>

<script>
    let selectedFile = null;

    function handleFile(files) {
        if(files.length > 0) {
            selectedFile = files[0];
            document.getElementById('fileName').innerText = "Selected: " + selectedFile.name;
            document.getElementById('runBtn').disabled = false;
        }
    }

    async function runPipeline() {
        if(!selectedFile) return;

        const btn = document.getElementById('runBtn');
        const statusDiv = document.getElementById('status');
        const logArea = document.getElementById('logArea');
        const resultArea = document.getElementById('resultArea');

        btn.disabled = true;
        btn.innerText = "Submitting Task...";
        statusDiv.style.display = 'block';
        resultArea.style.display = 'none';

        logArea.innerHTML = `
            <div class="step done">🚀 Uploading PDB file...</div>
        `;

        const formData = new FormData();
        formData.append('pdb_file', selectedFile);

        try {
            // 1. 发送任务给后端 (瞬间返回)
            const response = await fetch('/api/run', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.status === 'processing') {
                const taskId = data.task_id;
                console.log("Task submitted successfully, ID:", taskId);

                btn.innerText = "AI Computing in Background...";
                logArea.innerHTML += `
                    <div class="step active"><span class="loading-dots">⏳ Running AI models (PocketMiner → MD Engine → GraphBP)</span><br><small style="color: #7f8c8d; font-size: 12px; margin-top: 5px; display: inline-block;">This may take a few minutes. Please keep this page open.</small></div>
                `;

                // 2. 开启轮询：每 3 秒查一次状态
                const intervalId = setInterval(async () => {
                    try {
                        const statusRes = await fetch(`/api/status?task_id=${taskId}`);
                        const statusData = await statusRes.json();

                        if (statusData.status === 'success') {
                            // 计算完成，停止轮询
                            clearInterval(intervalId);

                            logArea.innerHTML = `
                                <div class="step done">✅ Upload Complete</div>
                                <div class="step done">✅ PocketMiner: Found pocket at residue ${statusData.pocket_residue}</div>
                                <div class="step done">✅ MD Engine: Conformation induced successfully</div>
                                <div class="step done">✅ GraphBP: Molecules generated!</div>
                            `;

                            document.getElementById('resIdx').innerText = statusData.pocket_residue;

                            if (statusData.center && statusData.center.length === 3) {
                                document.getElementById('centerCoord').innerText = `[${statusData.center[0].toFixed(2)}, ${statusData.center[1].toFixed(2)}, ${statusData.center[2].toFixed(2)}]`;
                            }

                            document.getElementById('downloadLink').href = statusData.result_url;
                            document.getElementById('downloadPdbLink').href = statusData.pdb_url;

                            resultArea.style.display = 'block';
                            btn.disabled = false;
                            btn.innerText = "Run Another Pipeline";

                        } else if (statusData.status === 'error') {
                            // 发生错误，停止轮询
                            clearInterval(intervalId);
                            logArea.innerHTML = `<div class="step" style="color:red">❌ Pipeline Error: ${statusData.message}</div>`;
                            btn.disabled = false;
                            btn.innerText = "Run AI Pipeline";
                        }
                        // 如果状态是 'processing'，就什么也不做，等下个 3 秒

                    } catch (pollError) {
                        console.error("Polling error:", pollError);
                        // 遇到偶尔的网络波动不停止，继续尝试下一次轮询
                    }
                }, 3000); // 3000ms = 3s

            } else {
                logArea.innerHTML += `<div class="step" style="color:red">❌ Submission Error: ${data.message}</div>`;
                btn.disabled = false;
                btn.innerText = "Run AI Pipeline";
            }
        } catch (error) {
            logArea.innerHTML += `<div class="step" style="color:red">❌ Network Error: ${error}</div>`;
            btn.disabled = false;
            btn.innerText = "Run AI Pipeline";
        }
    }
</script>

</body>
</html>
