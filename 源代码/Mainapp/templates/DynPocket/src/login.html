<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome!</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
</head>
<body>
    <!-- partial:index.partial.html -->
    <!-- Form-->
    <div class="form">
        <div class="form-toggle"></div>
        <div class="form-panel one">
            <div class="form-header">
                <img src="../images/logo.png" alt="logo">
                <h1><i class="fa fa-globe"></i> Account &nbsp;Login</h1>
            </div>
            <div class="form-content">
                <form id="loginForm" method="post" action="/login/">
                    <div class="form-group">
                        <label for="email"><i class="fa fa-envelope"></i> User ID / Email Address</label>
                        <input type="email" id="email" name="user" required="required">
                    </div>
                    <div class="form-group">
                        <label for="password"><i class="fa fa-lock"></i> Password</label>
                        <input type="password" id="password" name="pwd" required="required">
                    </div>
                    <div class="form-group">
                        <label class="form-remember">
                            <input type="checkbox">Remember Me
                        </label><a class="form-recovery" href="#">Forgot Password?</a>
                    </div>
                    <div class="form-group">
                        <button type="submit">Log In</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="form-panel two">
            <div class="form-header">
                <h1>Register Account</h1>
            </div>
            <div class="form-content">
                <form id="register-form" method="post" action="http://8.218.164.134:8000/register/">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required="required">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required="required">
                    </div>
                    <div class="form-group">
                        <label for="cpassword">Confirm Password</label>
                        <input type="password" id="cpassword" name="cpassword" required="required">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required="required">
                    </div>
                    <div class="form-group">
                        <button type="submit">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 底栏 -->
    <div class="footer">
        <div class="sub_logo">
            <img src="../images/logo.png" alt="logo">
        </div>
        <div class="copyright">
            <span><i class="fa fa-copyright"></i> CopyRight 2024 PocketSeeker</span>
        </div>
        <div class="about">
            <span><i class="fa fa-balance-scale"></i> Legal Notices & Manage Cookies</span>
        </div>
        <div class="contact-info">
            <span><i class="fa fa-envelope-o"></i> Contact us shily_ld@foxmail.com</span>
        </div>
    </div>










<!-- style -->
    <script src='../js/loginres/jquery.min.js'></script>
    <script src="../js/loginres/script.js"></script>

<!-- logic -->

    <script src="../js/loginres/register_logic.js"></script>
    <script src="../js/loginres/login_logic.js"></script> -->


</body>
</html>
